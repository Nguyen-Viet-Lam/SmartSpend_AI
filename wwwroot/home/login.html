<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Đăng nhập — AI Study</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">

  <style>
    .password-wrap{
      position: relative;
    }

    .password-wrap .form-control{
      padding-right: 48px;
    }

    .toggle-password{
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.65);
      cursor: pointer;
    }

    .toggle-password:hover{
      color: #fff;
    }

    .toggle-password svg{
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>

  <!-- AI LOGO ANIMATION LOADER -->
  <div id="page-loader" class="logo-loader">
    <div class="logo-loader-box">
      <div class="ai-orbit orbit-1"></div>
      <div class="ai-orbit orbit-2"></div>
      <div class="ai-logo-core">
        <span>AI</span>
      </div>
      <h4>AI Study</h4>
      <p>Hệ thống học tập thông minh đang khởi động</p>
    </div>
  </div>

  <div class="page-content">
    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass py-3">
      <div class="container">
        <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="index.html">
          <img src="../assets/img/logo.svg" alt="AI Study Logo" width="34" height="34">
          <span>AI Study</span>
        </a>

        <div class="d-flex gap-2">
          <a class="btn btn-outline-light" href="register.html">Đăng ký</a>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center align-items-center" style="min-height: 75vh;">
        <div class="col-lg-5 col-md-7">
          <div class="glass p-4 p-md-5">
            <h2 class="fw-bold mb-2">Đăng nhập</h2>
            <p class="text-muted-2 mb-4">
              Đăng nhập để lưu lịch sử, tuỳ chỉnh đề, xem phân tích học tập.
            </p>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input class="form-control" type="email" placeholder="name@email.com">
            </div>

            <div class="mb-3">
              <label class="form-label">Mật khẩu</label>
              <div class="password-wrap">
                <input id="password" class="form-control" type="password" placeholder="••••••••">

                <button type="button" class="toggle-password" id="togglePassword" aria-label="Hiện/ẩn mật khẩu">
                  <!-- icon mắt mở -->
                  <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7Z"/>
                    <circle cx="12" cy="12" r="3" stroke-width="1.8"/>
                  </svg>

                  <!-- icon mắt đóng -->
                  <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:none;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                      d="M3 3l18 18M10.585 10.587A2 2 0 0 0 13.414 13.414M9.88 5.09A10.94 10.94 0 0 1 12 5c4.478 0 8.268 2.943 9.542 7a10.95 10.95 0 0 1-4.043 5.135M6.228 6.228A10.944 10.944 0 0 0 2.458 12c1.274 4.057 5.064 7 9.542 7 1.61 0 3.14-.38 4.498-1.057"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label" for="remember">Ghi nhớ đăng nhập</label>
              </div>
              <a class="text-decoration-none" href="#">Quên mật khẩu?</a>
            </div>

            <a class="btn btn-primary w-100 py-2" href="dashboard.html">Đăng nhập</a>

            <div class="mt-4 text-muted-2">
              Chưa có tài khoản?
              <a class="text-white fw-semibold" href="register.html">Đăng ký ngay</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>

  <script>
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");
    const eyeOpen = document.getElementById("eyeOpen");
    const eyeClosed = document.getElementById("eyeClosed");

    togglePassword.addEventListener("click", function () {
      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";

      eyeOpen.style.display = isPassword ? "none" : "block";
      eyeClosed.style.display = isPassword ? "block" : "none";
    });
  </script>
</body>
</html>
