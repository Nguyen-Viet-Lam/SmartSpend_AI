<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Đăng nhập — AI Study</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="../css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="page-loader" class="logo-loader">
      <div class="logo-loader-box">
        <div class="ai-orbit orbit-1"></div>
        <div class="ai-orbit orbit-2"></div>
        <div class="ai-logo-core">
          <span>AI</span>
        </div>
        <h4>AI Study</h4>
        <p>Hệ thống học tập thông minh đang khởi động</p>
      </div>
    </div>

    <div class="page-content">
      <nav class="navbar navbar-expand-lg navbar-dark navbar-glass py-3">
        <div class="container">
          <a class="navbar-brand fw-semibold" href="/home/index.html">AI Study</a>
          <div class="d-flex gap-2" data-auth-guest>
            <a class="btn btn-outline-light" href="/home/register.html">Đăng ký</a>
          </div>
        </div>
      </nav>

      <main class="auth-page">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-5">
              <div class="glass p-4">
            <h3 class="fw-bold mb-2">Đăng nhập</h3>
            <p class="text-muted-2">
              Đăng nhập để lưu lịch sử, tuỳ chỉnh đề, xem phân tích học tập.
            </p>

            <div class="alert alert-danger d-none" id="alertBox">
              <span id="alertMsg"></span>
            </div>

            <form id="loginForm" novalidate>
            <div class="mb-3">
              <label class="form-label" for="email">Email hoặc tên đăng nhập</label>
              <input
                id="email"
                name="emailOrUsername"
                class="form-control"
                placeholder="name@email.com hoặc username"
                type="text"
                autocomplete="username"
                required
              />
              <div class="invalid-feedback d-block" id="emailError"></div>
            </div>

            <div class="mb-3">
              <label class="form-label" for="password">Mật khẩu</label>
              <div class="position-relative">
                <input
                  id="password"
                  name="password"
                  class="form-control"
                  placeholder="••••••••"
                  type="password"
                  autocomplete="current-password"
                  required
                />
                <button
                  type="button"
                  class="btn btn-link position-absolute top-50 end-0 translate-middle-y text-decoration-none"
                  id="togglePwd"
                  aria-label="Hiện/ẩn mật khẩu"
                >
                  <svg id="eyeIcon" width="18" height="18" fill="none" viewBox="0 0 24 24">
                    <path
                      stroke="currentColor"
                      stroke-width="2"
                      d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                    />
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
                  </svg>
                </button>
              </div>
              <div class="invalid-feedback d-block" id="passwordError"></div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <label class="form-check-label" for="rememberMe"
                  ></label
                >
              </div>
              <a class="text-muted-2" href="#">Quên mật khẩu?</a>
            </div>

            <button id="loginButton" type="submit" class="btn btn-primary w-100">Đăng nhập</button>

            <div class="auth-divider" role="separator" aria-label="Hoặc đăng nhập bằng tài khoản khác">
              <span>hoặc</span>
            </div>

            <button
              id="googleLoginButton"
              type="button"
              class="btn google-login-btn w-100"
              aria-label="Đăng nhập với Google"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9a6 6 0 1 1 0-12c2.3 0 3.8 1 4.7 1.8l3.2-3.1C17.8 2.7 15.2 1.7 12 1.7a10.3 10.3 0 1 0 0 20.6c5.9 0 9.8-4.2 9.8-10.1 0-.7-.1-1.4-.2-2H12Z" />
                <path fill="#34A853" d="M2.6 7.8 5.8 10c.9-2.6 3.3-4.3 6.2-4.3 2.3 0 3.8 1 4.7 1.8l3.2-3.1C17.8 2.7 15.2 1.7 12 1.7c-4 0-7.5 2.3-9.4 6.1Z" opacity="0"/>
                <path fill="#FBBC05" d="M12 22.3c3.1 0 5.7-1 7.6-2.8l-3.5-2.8c-.9.7-2.2 1.2-4.1 1.2-3.9 0-5.3-2.6-5.5-3.9l-3.3 2.5a10.3 10.3 0 0 0 8.8 5.8Z" />
                <path fill="#4285F4" d="M2.6 7.8A10.2 10.2 0 0 0 1.7 12c0 1.5.3 2.9.9 4.3l3.3-2.5A6.3 6.3 0 0 1 5.6 12c0-.6.1-1.2.3-1.8L2.6 7.8Z" />
              </svg>
              <span>Đăng nhập với Google</span>
            </button>
            <div class="text-muted-2 small mt-3">
              Chưa có tài khoản?
              <a href="/home/register.html" class="text-white">Đăng ký</a>
            </div>
            </form>
          </div>
        </div>
      </div>
    </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
