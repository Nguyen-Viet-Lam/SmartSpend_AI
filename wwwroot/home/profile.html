<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hồ sơ | SmartSpend AI</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/auth.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js" defer></script>
  <script src="/js/app-shell.js" defer></script>
  <script src="/js/finance-pages.js" defer></script>
</head>
<body data-layout="app" data-page="profile" data-page-title="Hồ sơ cá nhân">
  <div class="page-shell">
    <aside class="app-sidebar" id="appSidebar"></aside>
    <div class="app-frame">
      <header class="app-topbar" id="appTopbar"></header>
      <main class="app-content">
        <section class="app-section">
          <div class="dashboard-grid">
            <article class="panel">
              <div class="panel-header">
                <div>
                  <h2>Thông tin tài khoản</h2>
                  <p class="muted">Cập nhật tên hiển thị, email và avatar từ một link ảnh.</p>
                </div>
              </div>
              <div class="avatar-shell" style="margin-bottom:20px;">
                <span class="avatar-dot profile-avatar-dot" id="profileAvatarDot" style="width:74px; height:74px; border-radius:24px;">AV</span>
                <img id="profileAvatarImage" class="profile-avatar-image" alt="Avatar người dùng" hidden>
                <div>
                  <strong>Avatar cá nhân</strong>
                  <div class="muted">Nếu để trống, hệ thống hiển thị chữ cái viết tắt.</div>
                </div>
              </div>
              <div class="summary-grid" style="grid-template-columns:1fr; margin-bottom:18px;">
                <article class="small-card"><strong>Ngày tạo</strong><div class="muted" id="profileCreatedAt">--</div></article>
                <article class="small-card"><strong>Xác thực email</strong><div class="muted" id="profileEmailVerified">--</div></article>
                <article class="small-card"><strong>Trạng thái</strong><div class="muted" id="profileLockStatus">--</div></article>
              </div>
              <form id="profileForm" class="form-stack">
                <div id="profileMessage" class="message" hidden></div>
                <div class="field">
                  <label for="profileUsername">Tên đăng nhập</label>
                  <input class="input" id="profileUsername" name="username" readonly>
                </div>
                <div class="form-grid">
                  <div class="field">
                    <label for="profileFullName">Họ và tên</label>
                    <input class="input" id="profileFullName" name="fullName" required>
                  </div>
                  <div class="field">
                    <label for="profileEmail">Email</label>
                    <input class="input" id="profileEmail" name="email" type="email" required>
                  </div>
                </div>
                <div class="field">
                  <label for="profileAvatarUrl">Avatar URL</label>
                  <input class="input" id="profileAvatarUrl" name="avatarUrl" type="url" placeholder="https://...">
                </div>
                <button class="btn btn-primary" type="submit">Cập nhật hồ sơ</button>
              </form>
            </article>
            <article class="panel">
              <div class="panel-header">
                <div>
                  <h2>Đổi mật khẩu</h2>
                  <p class="muted">Bảo vệ tài khoản bằng mật khẩu mạnh và thay đổi định kỳ.</p>
                </div>
              </div>
              <form id="passwordForm" class="form-stack">
                <div id="passwordMessage" class="message" hidden></div>
                <div class="field">
                  <label for="currentPassword">Mật khẩu hiện tại</label>
                  <input class="input" id="currentPassword" name="currentPassword" type="password" required>
                </div>
                <div class="field">
                  <label for="newPassword">Mật khẩu mới</label>
                  <input class="input" id="newPassword" name="newPassword" type="password" required>
                </div>
                <div class="field">
                  <label for="confirmPassword">Nhập lại mật khẩu mới</label>
                  <input class="input" id="confirmPassword" name="confirmPassword" type="password" required>
                </div>
                <button class="btn btn-accent" type="submit">Đổi mật khẩu</button>
              </form>
            </article>
          </div>
        </section>
      </main>
    </div>
  </div>
  <div class="app-backdrop" id="appBackdrop"></div>
  <a class="btn btn-primary fab" href="/home/transactions.html#quick-add">+ Thêm giao dịch</a>
</body>
</html>
