<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên mật khẩu | SmartSpend AI</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/auth.js" defer></script>
  <script src="/js/app-shell.js" defer></script>
  <script src="/js/auth-pages.js" defer></script>
</head>
<body data-layout="public">
  <header class="public-header">
    <div class="container">
      <a class="brand" href="/home/index.html"><span class="brand-mark">S</span><span>SmartSpend AI</span></a>
      <a class="btn btn-secondary" href="/home/login.html">Quay lại đăng nhập</a>
    </div>
  </header>
  <main class="auth-layout">
    <div class="container two-column">
      <section class="auth-card">
        <div class="auth-heading">
          <span class="eyebrow">Password reset</span>
          <h1>Yêu cầu OTP đặt lại mật khẩu</h1>
          <p>Hệ thống sẽ gửi mã OTP tới email của bạn nếu tài khoản tồn tại.</p>
        </div>
        <form id="forgotPasswordForm" class="form-stack">
          <div id="forgotMessage" class="message" hidden></div>
          <div class="field">
            <label for="forgotEmail">Email</label>
            <input class="input" id="forgotEmail" name="email" type="email" required>
          </div>
          <button class="btn btn-primary btn-block" type="submit">Gửi mã OTP</button>
        </form>
      </section>
      <aside class="auth-aside">
        <h2>Flow reset mật khẩu gọn và rõ</h2>
        <ul class="feature-list">
          <li>Bước 1: nhập email.</li>
          <li>Bước 2: nhận OTP.</li>
          <li>Bước 3: đặt lại mật khẩu mới.</li>
        </ul>
      </aside>
    </div>
  </main>
</body>
</html>
