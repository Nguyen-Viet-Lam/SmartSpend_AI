<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Đăng ký - AI Study</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="../css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="page-loader" class="logo-loader">
  <div class="logo-loader-box">
    <div class="ai-orbit orbit-1"></div>
    <div class="ai-orbit orbit-2"></div>
    <div class="ai-logo-core">
      <span>AI</span>
    </div>
    <h4>AI Study</h4>
    <p>Hệ thống học tập thông minh đang khởi động</p>
  </div>
</div>

<div class="page-content">
    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass py-3">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="index.html">AI Study</a>
        <div class="d-flex gap-2" data-auth-guest>
          <a class="btn btn-outline-light" href="/home/login.html">Đăng nhập</a>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="glass p-4">
            <h3 class="fw-bold mb-2">Đăng ký</h3>
            <p class="text-muted-2">
              Tạo tài khoản để dùng đầy đủ: tùy chỉnh đề, lưu lịch sử, phân tích học tập.
            </p>

            <form id="registerForm" class="row g-3" novalidate>
              <div class="col-12">
                <label class="form-label" for="username">Tên đăng nhập</label>
                <input
                  id="username"
                  name="username"
                  class="form-control"
                  placeholder="nguyenvana"
                  maxlength="64"
                  autocomplete="username"
                  required
                />
                <div class="invalid-feedback" id="usernameError"></div>
              </div>

              <div class="col-12">
                <label class="form-label" for="fullName">Họ tên</label>
                <input
                  id="fullName"
                  name="fullName"
                  class="form-control"
                  placeholder="Nguyễn Văn A"
                  maxlength="128"
                  autocomplete="name"
                  required
                />
                <div class="invalid-feedback" id="fullNameError"></div>
              </div>

              <div class="col-12">
                <label class="form-label" for="email">Email</label>
                <input
                  id="email"
                  name="email"
                  class="form-control"
                  placeholder="name@email.com"
                  type="email"
                  maxlength="256"
                  autocomplete="email"
                  required
                />
                <div class="invalid-feedback" id="emailError"></div>
              </div>

              <div class="col-12">
                <label class="form-label" for="password">Mật khẩu</label>
                <input
                  id="password"
                  name="password"
                  class="form-control"
                  type="password"
                  placeholder="********"
                  minlength="8"
                  maxlength="128"
                  autocomplete="new-password"
                  required
                />
                <div class="invalid-feedback" id="passwordError"></div>
              </div>

              <div class="col-12">
                <label class="form-label" for="confirmPassword">Nhập lại mật khẩu</label>
                <input
                  id="confirmPassword"
                  name="confirmPassword"
                  class="form-control"
                  type="password"
                  placeholder="********"
                  minlength="8"
                  maxlength="128"
                  autocomplete="new-password"
                  required
                />
                <div class="invalid-feedback" id="confirmPasswordError"></div>
              </div>

              <div class="col-12">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="toggleRegisterPasswords" />
                  <label class="form-check-label" for="toggleRegisterPasswords">Hiện mật khẩu</label>
                </div>
              </div>

              <div class="col-12">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="agree" />
                  <label class="form-check-label" for="agree">
                    Tôi đồng ý với điều khoản sử dụng
                  </label>
                </div>
                <div class="invalid-feedback d-block" id="acceptTermsError"></div>
              </div>

              <div class="col-12">
                <div id="registerMessage" class="small mb-3"></div>
                <button id="registerButton" type="submit" class="btn btn-primary w-100">
                  Tạo tài khoản
                </button>
                <div class="text-muted-2 small mt-3">
                  Đã có tài khoản?
                  <a href="/home/login.html" class="text-white">Đăng nhập</a>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer"></footer>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/auth.js"></script>
  <script src="../assets/js/main.js"></script>
    <script src="../js/register.js"></script>
  </body>
</html>
